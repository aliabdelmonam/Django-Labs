<!DOCTYPE html>
<html>
<head>
    <title>Instructors List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% load static %}
<link rel="stylesheet" href="{% static 'courses/style.css' %}">
    <div class="container mt-5">
        <h1>Instructors</h1>
        <div class="row">
        {% for instructor in instructors %}
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ instructor.name }}</h5>
                        <p class="card-text">
                            <strong>Title:</strong> {{ instructor.title }}<br>
                            <strong>Email:</strong> {{ instructor.email }}<br>
                            <strong>Department:</strong> {{ instructor.department|default:"N/A" }}
                        </p>
                        <a href="{% url 'instructor_details' instructor.pk %}" class="btn btn-primary">Details</a>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-12">
                <div class="alert alert-info">No instructors available.</div>
            </div>
        {% endfor %}
        </div>
        <a href="/course/" class="btn btn-secondary mt-3">Courses</a>
    </div>
</body>
</html>
